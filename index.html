<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helpdesk Chatbot</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-900 text-white flex flex-col h-screen">

<div class="p-4 border-b border-slate-700">
<h1 class="text-lg">Helpdesk Chatbot</h1>
</div>

<div id="chat" class="flex-1 overflow-y-auto p-4"></div>

<div class="p-4 flex gap-2">
<input id="msg" class="flex-1 p-2 text-black rounded" placeholder="พิมพ์คำถาม...">
<button onclick="send()" class="bg-green-500 px-4 py-2 rounded">Send</button>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw7t445cU19YzDpl86xY_5S4prPBvuLjJJqU2mf5E1H3o1meWsGafEW9rroqsS5xjJY/exec";

function addMessage(text,type){
const chat=document.getElementById("chat")
const div=document.createElement("div")
div.className = type==="user" ? "text-right mb-2" : "text-left mb-2"
div.innerText=text
chat.appendChild(div)
}

async function send(){

const input=document.getElementById("msg")
const text=input.value.trim()
if(!text) return

addMessage(text,"user")
input.value=""

const res = await fetch(API_URL,{
method:"POST",
body: JSON.stringify({question:text})
})

const data = await res.json()

addMessage(data.answer || "ไม่พบข้อมูล","bot")
}

</script>

</body>
</html>
